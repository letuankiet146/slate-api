name: slate-api

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slatevn}
      POSTGRES_USER: ${POSTGRES_USER:-slatevn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slatevn}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slatevn} -d ${POSTGRES_DB:-slatevn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/slatevn}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-slatevn}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-slatevn}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-secret-key-at-least-256-bits!!}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-14}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@slatevn.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-System Admin}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
