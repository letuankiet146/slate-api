server:
  port: ${PORT:8080}

spring:
  application:
    name: slatevn-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/slatevn}
    username: ${DATABASE_USERNAME:slatevn}
    password: ${DATABASE_PASSWORD:slatevn}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-256-bits!!}
    access-token-minutes: ${JWT_ACCESS_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  bootstrap:
    admin-email: ${ADMIN_EMAIL:admin@slatevn.local}
    admin-password: ${ADMIN_PASSWORD:Admin123!}
    admin-display-name: ${ADMIN_DISPLAY_NAME:System Admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

logging:
  level:
    org.springframework.security: INFO
